<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berserk Anime API</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./bootstrap/js/bootstrap.bundle.min.js" defer></script>
    <script src="./js/include.js" defer></script>
    <script src="./js/anime-api.js" defer></script>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/png" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <!-- MAIN -->
    <section class="py-5 text-white">
      <div class="container text-center">
        <h1 class="display-4 fw-bold mb-4">Berserk Anime Information</h1>
        <p class="lead mb-5">
          Click the button below to load data from an anime API.
        </p>
        <button id="loadAnimeBtn" class="btn btn-danger btn-lg">
          Load Anime Info
        </button>

        <!-- LOADING -->
        <div id="loadingSpinner" class="mt-4 d-none">
          <div class="spinner-border text-danger"></div>
        </div>
        <!-- RESULT -->
        <div id="animeContainer" class="mt-5"></div>
      </div>
    </section>
    <!-- FOOTER -->
    <div id="footer-container"></div>
  </body>
</html>
